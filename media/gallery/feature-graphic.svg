<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2048 1024" role="img" aria-labelledby="title desc">
  <title id="title">Gallery App feature graphic</title>
  <desc id="desc">A feature graphic presenting the Gallery App with albums, favorites, and photo browsing.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f4fbff"/>
      <stop offset="0.5" stop-color="#fff8ef"/>
      <stop offset="1" stop-color="#ffe6ed"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="32" stdDeviation="34" flood-color="#1e2430" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="2048" height="1024" fill="url(#bg)"/>
  <circle cx="1840" cy="188" r="126" fill="#5aa9ff" opacity="0.14"/>
  <circle cx="184" cy="830" r="146" fill="#f8798f" opacity="0.13"/>
  <text x="150" y="290" fill="#30343b" font-family="Montserrat, Arial, sans-serif" font-size="92" font-weight="700">Gallery App</text>
  <text x="154" y="370" fill="#616b68" font-family="Montserrat, Arial, sans-serif" font-size="42">Organize every memory with clean albums,</text>
  <text x="154" y="430" fill="#616b68" font-family="Montserrat, Arial, sans-serif" font-size="42">quick favorites and smooth photo browsing.</text>
  <rect x="154" y="542" width="230" height="78" rx="39" fill="#5aa9ff"/>
  <text x="214" y="594" fill="#ffffff" font-family="Montserrat, Arial, sans-serif" font-size="27" font-weight="700">Albums</text>
  <rect x="416" y="542" width="256" height="78" rx="39" fill="#ffffff" stroke="#dce6ef"/>
  <text x="476" y="594" fill="#30343b" font-family="Montserrat, Arial, sans-serif" font-size="27" font-weight="700">Favorites</text>
  <rect x="704" y="542" width="286" height="78" rx="39" fill="#ffffff" stroke="#dce6ef"/>
  <text x="762" y="594" fill="#30343b" font-family="Montserrat, Arial, sans-serif" font-size="27" font-weight="700">Photo Grid</text>
  <g filter="url(#shadow)">
