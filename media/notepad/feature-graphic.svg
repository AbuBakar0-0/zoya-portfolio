<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2048 1024" role="img" aria-labelledby="title desc">
  <title id="title">Notepad App feature graphic</title>
  <desc id="desc">A feature graphic presenting the Notepad App with voice notes, reminders, and organized notes.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff7f0"/>
      <stop offset="0.5" stop-color="#f6fbf9"/>
      <stop offset="1" stop-color="#ffe5ea"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="32" stdDeviation="34" flood-color="#2a171c" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="2048" height="1024" fill="url(#bg)"/>
  <circle cx="1850" cy="188" r="126" fill="#26a69a" opacity="0.14"/>
  <circle cx="184" cy="830" r="146" fill="#f8798f" opacity="0.13"/>
  <text x="150" y="290" fill="#333333" font-family="Montserrat, Arial, sans-serif" font-size="92" font-weight="700">Notepad App</text>
  <text x="154" y="370" fill="#616b68" font-family="Montserrat, Arial, sans-serif" font-size="42">Capture thoughts faster with voice notes,</text>
  <text x="154" y="430" fill="#616b68" font-family="Montserrat, Arial, sans-serif" font-size="42">smart reminders and organized folders.</text>
  <rect x="154" y="542" width="280" height="78" rx="39" fill="#f8798f"/>
  <text x="214" y="594" fill="#ffffff" font-family="Montserrat, Arial, sans-serif" font-size="27" font-weight="700">Voice Notes</text>
  <rect x="466" y="542" width="278" height="78" rx="39" fill="#ffffff" stroke="#dcebe7"/>
  <text x="524" y="594" fill="#333333" font-family="Montserrat, Arial, sans-serif" font-size="27" font-weight="700">Reminders</text>
  <rect x="776" y="542" width="310" height="78" rx="39" fill="#ffffff" stroke="#dcebe7"/>
  <text x="832" y="594" fill="#333333" font-family="Montserrat, Arial, sans-serif" font-size="27" font-weight="700">Smart Folders</text>
  <g filter="url(#shadow)">
    <rect x="1254" y="96" width="504" height="832" rx="82" fill="#211f22"/>
    <rect x="1290" y="144" width="432" height="736" rx="54" fill="#fffaf7"/>
    <rect x="1440" y="174" width="132" height="14" rx="7" fill="#211f22" opacity="0.55"/>
    <text x="1350" y="284" fill="#333333" font-family="Montserrat, Arial, sans-serif" font-size="40" font-weight="700">Today</text>
    <rect x="1350" y="342" width="312" height="148" rx="32" fill="#ffffff" stroke="#eedfe2"/>
    <rect x="1386" y="386" width="184" height="18" rx="9" fill="#333333"/>
    <rect x="1386" y="424" width="232" height="14" rx="7" fill="#b9c8c4"/>
    <rect x="1350" y="526" width="312" height="148" rx="32" fill="#f1fbf8"/>
    <path d="M1398 614v-42M1450 636v-86M1502 656v-126M1554 636v-86M1606 614v-42" fill="none" stroke="#26a69a" stroke-width="24" stroke-linecap="round"/>
    <rect x="1350" y="710" width="312" height="92" rx="32" fill="#fff1f4"/>
    <circle cx="1400" cy="756" r="22" fill="#f8798f"/>
    <rect x="1440" y="738" width="154" height="16" rx="8" fill="#333333"/>
    <rect x="1440" y="768" width="112" height="12" rx="6" fill="#b99ca4"/>
  </g>
</svg>
